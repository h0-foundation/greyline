services:
  greyline:
    build: .
    image: greyline:local
    container_name: greyline
    # Bound to loopback — never reachable from other machines on the network.
    ports:
      - "127.0.0.1:3000:3000"
    # Your data lives here. Back it up by copying ./data.
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
