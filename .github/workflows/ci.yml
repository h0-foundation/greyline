name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (cached if same SHA)
        run: pnpm build

      # Note: the offline world basemap (public/geo/world.pmtiles) is committed
      # in-repo and picked up by `pnpm seed`. It is NOT built here — `build:tiles`
      # needs the tippecanoe binary (absent on runners) and is maintainer-only.
      - name: Migrate + seed local SQLite
        run: pnpm migrate && pnpm seed

      # The e2e suite asserts against bundled data (REST Countries, OurAirports,
      # passport-index, trip-data templates). In CI these steps use the COMMITTED
      # snapshots (rest-countries.json, airports.csv.gz, passport-index.csv.gz) and
      # do NOT touch the network — `process.env.CI` makes build:countries/build:data
      # bundle-first, so an upstream outage can't red the pipeline. The dossier +
      # advisories scripts hit external APIs and are intentionally skipped —
      # features depending on them gracefully no-op when their tables are empty.
      - name: Bundle countries (committed snapshot in CI)
        run: pnpm build:countries

      - name: Bundle airports + visa matrix (committed snapshots in CI)
        run: pnpm build:data

      - name: Bundle trip-data templates (packing / airlines / opsec / docs)
        run: pnpm build:trip-data

      - name: Run Playwright
        run: pnpm exec playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
