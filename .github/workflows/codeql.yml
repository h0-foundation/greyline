# CodeQL — GitHub's first-party SAST scanner. Runs on a weekly schedule against
# `main` plus on every PR that touches JS/TS source. Free for public repos.
# Findings publish to the repo's Security tab; high-severity ones gate merge if
# you've made CodeQL a required check in branch protection.
name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
  schedule:
    - cron: "23 4 * * 1"          # Mondays at 04:23 UTC — off-peak
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JS/TS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
