# Dependency-review — blocks PRs that introduce dependencies with known CVEs
# above a severity threshold, or that violate the project's license policy.
# Light, fast, free; runs only when the lockfile or manifests change.
name: Dependency review

on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read
  pull-requests: write              # post the inline review comment

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review new dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Compatible with our AGPL-3.0 license. Block dependencies under
          # licenses that GPL is known to conflict with at distribution time.
          deny-licenses: "AGPL-1.0, GPL-2.0, LGPL-2.0, EUPL-1.0, EUPL-1.1, EUPL-1.2, SSPL-1.0, Commons-Clause, BUSL-1.1"
          comment-summary-in-pr: on-failure
