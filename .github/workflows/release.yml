# Publishes a GitHub Release when a v* tag is pushed. Re-runs the quality gate
# (lint + typecheck + unit + build) as a sanity check — the full Playwright e2e
# already ran on `main` before the tag — then creates the release from the
# matching CHANGELOG.md section. Tag a release with:  git tag -a vX.Y.Z && git push origin vX.Y.Z
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ ("^## \\[" v "\\]") { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG section found for $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "Greyline $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --verify-tag
