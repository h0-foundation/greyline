# release-please — every push to main accumulates conventional commits into a
# rolling "Release X.Y.Z" PR. Merging that PR cuts a GitHub Release + tags +
# updates CHANGELOG.md. Conventional commits are enforced at the PR level via
# the maintainer's discretion — there is no commitlint gate yet.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: node
          # Where the changelog is written and the package.json version lives.
          path: .
          # First release isn't until you cut one — release-please will create
          # the bootstrap PR on the next push if no GitHub Release exists yet.
