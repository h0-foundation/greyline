# Auto-labels PRs by changed file paths. Config lives in .github/labeler.yml.
# Useful for filtering the PR list ('area/ui', 'area/data', 'deps', etc.).
name: Auto-labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
