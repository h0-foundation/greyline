# OpenSSF Scorecard — measures security posture across ~20 axes (branch
# protection, signed releases, dependency hygiene, CI tests, fuzzing, SAST,
# tokens-permissions, etc.). Result publishes to scorecard.dev and the repo's
# Security tab. Passive — never blocks. Weekly is the cadence OpenSSF recommends.
name: OpenSSF Scorecard

on:
  branch_protection_rule: {}
  schedule:
    - cron: "17 2 * * 1"          # Mondays at 02:17 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write       # Upload SARIF
      id-token: write               # Sign attestation for publish_results
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true      # Public on scorecard.dev — toggles on for public repos

      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
